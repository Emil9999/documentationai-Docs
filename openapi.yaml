openapi: '3.0.0'
info:
  version: 1.0.0
  title: Backend API
  description: >
    This is the API specification for the Backend API service, which manages
    companies, jobs, bookings, campaigns, and applications.
servers:
  - url: http://127.0.0.1:8000/api
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        200:
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: ping pong!
  /me:
    get:
      summary: Get current user info
      operationId: getCurrentUser
      security:
        - SessionAuth: []
        - TokenAuth: []
      responses:
        200:
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
  /companies:
    get:
      summary: List companies
      operationId: listCompanies
      security:
        - SessionAuth: []
        - TokenAuth: []
      responses:
        200:
          description: A list of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Company'
    post:
      summary: Create a company
      operationId: createCompany
      security:
        - SessionAuth: []
        - TokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInput'
      responses:
        201:
          description: Company created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
  /jobs:
    get:
      summary: List jobs
      operationId: listJobs
      security:
        - SessionAuth: []
        - TokenAuth: []
      responses:
        200:
          description: A list of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Job'
    post:
      summary: Create a job posting
      operationId: createJob
      security:
        - SessionAuth: []
        - TokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobInput'
      responses:
        201:
          description: Job created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
  /applications:
    get:
      summary: List applications
      operationId: listApplications
      security:
        - SessionAuth: []
        - TokenAuth: []
      responses:
        200:
          description: A list of applications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Application'
    post:
      summary: Submit an application
      operationId: createApplication
      security:
        - SessionAuth: []
        - TokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationInput'
      responses:
        201:
          description: Application submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
components:
  securitySchemes:
    SessionAuth:
      type: apiKey
      in: header
      name: Cookie
    TokenAuth:
      type: apiKey
      in: header
      name: Authorization
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        first_name:
          type: string
        last_name:
          type: string
    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        is_active:
          type: boolean
    CompanyInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string
    Job:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        location:
          type: string
        company:
          type: integer
    JobInput:
      type: object
      required:
        - title
        - company
      properties:
        title:
          type: string
        description:
          type: string
        location:
          type: string
        company:
          type: integer
    Application:
      type: object
      properties:
        id:
          type: integer
        job:
          type: integer
        candidate_name:
          type: string
        candidate_email:
          type: string
        status:
          type: string
    ApplicationInput:
      type: object
      required:
        - job
        - candidate_name
        - candidate_email
      properties:
        job:
          type: integer
        candidate_name:
          type: string
        candidate_email:
          type: string
